name: arrow_interaction_peer
drones:
  lb3:
    target: [ -0.3, 0.2, 1.0 ]
    waypoints: []
    delta_t: 60
    iterations: 1    
    interaction: peer
    params:
      linear: true
      relative: false
    servos: [ [179, 359], [179, 359] ]
    color: [ 227, 253, 255 ]
  lb5: #head
    target: [ 0.0, 0.5, 1.0, 0.0 ]
    waypoints: []
    delta_t: 60
    iterations: 1
    interaction: peer
    params:
      linear: true
      relative: false
    servos: [ [130, 220], [130, 220] ]
    color: [ 227, 253, 255 ]

Interaction:
  action: translation
  peer_transport: tcp
  config:
    delta_v: 0.2
    pos_threshold: 0.02
    z: 1
    friction_coefficient: 0
    base_attitude: -1
    duration: 60
    v_scalar: [ 10, 10, 3 ]
    grace_time: 2

boundary_limits:
  x_min: -7.0
  x_max: 5.0
  y_min: -4.0
  y_max: 4.0
  z_min: 0.3
  z_max: 2
