name: translation
drones:
  lb11:
    target: [0, 0, 1]
#    target: [-0.0126, -1.7515, 1]
    interaction: single

Interaction:
  action: translation
  config:
    delta_v: 0.15
    delta_a: 0
    z: -1
    friction_coefficient: 0
    base_attitude: 1
    duration: 60
    v_scalar: [10, 10, 5]
    grace_time: 0.5
    alpha_vel: 1               # velocity blending factor (0=state estimator only, 1=mocap only)
    mass_lightbender: 0.17      # physical mass of the LightBender drone (kg)
    mass_virtual: 0.17         # mass of the virtual object being pushed (kg); >1 = heavier feel, shorter motion

boundary_limits:
  x_min: -7.0
  x_max: 5.0
  y_min: -4.0
  y_max: 4.0
  z_min: 0.3
  z_max: 2
