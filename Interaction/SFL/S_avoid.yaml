name: drawing_s_interaction
drones:
  lb4:
    target: [ 0.0, -0.14, 1.08, 0.0 ] # Now the static reference
    waypoints: []
    delta_t: 60
    iterations: 1
    interaction: single
    params:
      linear: true
      relative: false
    servos: [ [29, 264] ]
    led:
      mode: "expression"
      rate: 50
      formula: "[230, 115, 21] if i - 50 > (49 - (t * 25)) else [0, 0, 0]"

  lb2:
    target: [ -0.16, -0.01, 1.32, 0.0 ]
    waypoints: []
    delta_t: 60
    iterations: 1
    params:
      linear: true
      relative: false
    interaction: avoid
    servos: [ [155, 387] ]
    led:
      mode: "expression"
      rate: 50
      formula: "[230, 115, 21] if i > (49 - (t * 25)) else [0, 0, 0]"

  lb3:
    target: [ 0.16, 0.0, 0.69, 0.0 ]
    waypoints: []
    delta_t: 60
    iterations: 1
    params:
      linear: true
      relative: false
    interaction: avoid
    servos: [ [ 210, 330 ] ]
    led:
      mode: "expression"
      rate: 50
      formula: "[230, 115, 21] if i - 150 > (49 - (t * 25)) else [0, 0, 0]"

  lb5:
    target: [ -0.01, 0.135, 0.92, 0.0 ]
    waypoints: []
    delta_t: 60
    iterations: 1
    params:
      linear: true
      relative: false
    interaction: avoid
    servos: [ [ 87, 209 ] ]
    led:
      mode: "expression"
      rate: 50
      formula: "[230, 115, 21] if i - 100 > (49 - (t * 25)) else [0, 0, 0]"

Interaction:
  action: translation
  config:
    delta_v: 0.13
    z: 1
    friction_coefficient: 0
    base_attitude: -1
    duration: 60
    v_scalar: [10, 10, 3]
    grace_time: 2

avoidance:
  eta: 0.5          # repulsive APF gain η
  zeta: 0.1         # attractive APF gain ζ (0 = no pull back to goal)
  d_detect: 0.47    # detection radius (m) — repulsion activates within this distance
  v_max: 2.0        # maximum APF-commanded speed (m/s)
  ctrl_rate: 100     # avoidance loop rate (Hz)

boundary_limits:
  x_min: -7.0
  x_max: 5.0
  y_min: -4.0
  y_max: 4.0
  z_min: 0.3
  z_max: 2


