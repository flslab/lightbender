name: peer_latency_test

# Droneless peer TCP latency test.
# On the receiver drone, run first:
#   python3 Interaction/tests/peer_latency_test.py --role receiver
#
# Then launch the orchestrator (sender side):
#   python3 orchestrator.py --interaction --droneless --skip-confirm
#
# Or run the sender directly:
#   python3 Interaction/tests/peer_latency_test.py --role sender --peer-ip <receiver_ip>

drones:
  lb10:
    target: [0.0, 0.0, 1.0]
    role: sender     # change to "receiver" on the other drone
  lb11:
    target: [0.0, 0.0, 1.0]
    role: receiver

Interaction:
  action: peer_latency_test
  peer: true
  peer_transport: tcp
  config:
    num_packets: 1000000
    port: 5570

boundary_limits:
  x_min: -7.0
  x_max: 5.0
  y_min: -4.0
  y_max: 4.0
  z_min: 0.3
  z_max: 2
