name: emoji_interaction
drones:
  lb5:
    target: [-0.25, 0.1, 1.15, 0.0]
    waypoints: []
    delta_t: 0.5
    iterations: 1
    interaction: single
    params:
      linear: true
      relative: false
    servos: [[20.0, 340.0]]
    led:
      mode: "expression"
      rate: 0.5
      formula: "[255, 157, 0]"
  lb3:
    target: [0.2, 0.0, 0.9, 0.0]
    waypoints: []
    delta_t: 0.5
    iterations: 1
    interaction: single
    params:
      linear: true
      relative: false
    servos: [[190.0, 350.0]]
    led:
      mode: "expression"
      rate: 0.5
      formula: "[255, 157, 0]"
  lb4:
    target: [0.0, -0.1, 1.15, 0.0]
    waypoints: []
    delta_t: 0.5
    iterations: 1
    interaction: single
    params:
      linear: true
      relative: false
    servos: [[160.0, 200.0]]
    led:
      mode: "expression"
      rate: 0.5
      formula: "[255, 157, 0]"


Interaction:
  action: translation
  config:
    delta_v: 0.1
    z: None
    friction_coefficient: 0
    base_attitude: -1
    duration: 60
    v_scalar: [10, 10, 3]
    grace_time: 2

avoidance:
  eta: 0.5          # repulsive APF gain η
  zeta: 0.1         # attractive APF gain ζ (0 = no pull back to goal)
  d_detect: 0.47    # detection radius (m) — repulsion activates within this distance
  v_max: 2.0        # maximum APF-commanded speed (m/s)
  ctrl_rate: 100     # avoidance loop rate (Hz)

boundary_limits:
  x_min: -7.0
  x_max: 5.0
  y_min: -4.0
  y_max: 4.0
  z_min: 0.3
  z_max: 2
