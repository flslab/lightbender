  zmq_interact_port: 5560

# ─── Network mode ─────────────────────────────────────────────────────────────
# mode: wifi      (default) — use existing infrastructure WiFi
# mode: adhoc     — 802.11 IBSS ad-hoc between drones + this machine (no router)
# mode: bluetooth — Bluetooth PAN; this machine acts as NAP, drones as PANU
#
# Each drone also needs an `adhoc_ip` field (used in both adhoc and bluetooth).
# controller_ip is the IP THIS machine takes on the new network.
#
network:
  mode: wifi        # wifi | adhoc | bluetooth

  adhoc:
    interface: wlan0
    ssid: fls-adhoc
    channel: 6
    controller_ip: 10.0.0.100   # set this on your laptop when joining the adhoc net

  bluetooth:
    interface: hci0
    controller_mac: "AA:BB:CC:DD:EE:FF"  # replace with: System Settings → About → Bluetooth
    controller_ip: 10.0.0.100            # IP your laptop uses on the BT PAN

